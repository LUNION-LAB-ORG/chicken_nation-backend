# Generic docker-compose for Chicken Nation Backend
#
# Usage : créer un .env à côté de ce fichier (cf. .env.example).
#
# Variables critiques côté APP :
#   DATABASE_URL=postgresql://...           (Neon ou Postgres local)
#   REDIS_HOST=redis                        (nom du service compose, pas localhost)
#   REDIS_PORT=6379
#   PORT=3020
#   CORS_ORIGINS=https://...
#   SKIP_MIGRATIONS=false                   (true sur le 2e backend si déploiement double)
#
# Variables d'ORCHESTRATION (déploiement multi-env sur même host) :
#   COMPOSE_PROJECT_NAME=chicken-nation-prod   (préfixe les noms de réseau, volumes, etc.)
#   APP_CONTAINER_NAME=chicken-nation-backend-prod
#   APP_IMAGE_TAG=prod                         (image: chicken-nation-backend:${APP_IMAGE_TAG})
#   HOST_BIND=127.0.0.1                        (ou 0.0.0.0 pour exposition directe)
#   HOST_PORT=8083                             (8083 prod, 8082 test, etc.)
#   REDIS_CONTAINER_NAME=chicken-nation-redis-prod
#   REDIS_HOST_BIND=127.0.0.1
#   REDIS_HOST_PORT=6379                       (mettre à 0 pour ne pas exposer si plusieurs envs)
#
# Build + démarrage :
#   docker compose up -d --build
#
# Migrations Prisma : appliquées automatiquement au démarrage du conteneur
# par docker-entrypoint.sh (idempotent, safe en parallèle grâce au lock Prisma).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: chicken-nation-backend:${APP_IMAGE_TAG:-latest}
    container_name: ${APP_CONTAINER_NAME:-chicken-nation-backend}
    env_file:
      - .env
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-3020}:3020"
    depends_on:
      - redis
    networks:
      - chicken_nation_network
    restart: unless-stopped

  redis:
    image: redis:8.2.1-alpine
    container_name: ${REDIS_CONTAINER_NAME:-chicken-nation-redis}
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - chicken_nation_network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  chicken_nation_network:
    driver: bridge
